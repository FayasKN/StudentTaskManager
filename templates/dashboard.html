<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            text-align: center;
        }

        h2 {
            color: #333;
        }

        .container {
            width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input {
            padding: 10px;
            width: 70%;
            margin: 10px;
        }

        button {
            padding: 10px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: darkgreen;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #eee;
            margin: 10px;
            padding: 10px;
            border-radius: 5px;
        }

        a {
            margin: 5px;
            text-decoration: none;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
        }

        .done {
            background: blue;
        }

        .delete {
            background: red;
        }

        .logout {
            background: black;
            float: right;
        }
    </style>
</head>
<body>

<div class="container">

    <a href="/logout" class="logout">Logout</a>

    <h2>Your Tasks</h2>

    <form action="/add/{{user_id}}" method="post">
        <input type="text" name="task" placeholder="Enter task" required>
        <button>Add</button>
    </form>

    <ul>
        {% for task in tasks %}
        <li>
            {{task[2]}} - {{task[3]}}
            <br><br>
            <a href="/complete/{{task[0]}}/{{user_id}}" class="done">Done</a>
            <a href="/delete/{{task[0]}}/{{user_id}}" class="delete">Delete</a>
        </li>
        {% endfor %}
    </ul>

</div>

</body>
</html>
